<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#bg)"/>

  <!-- Title bar -->
  <rect x="20" y="16" width="760" height="36" rx="6" fill="#1e293b"/>
  <circle cx="40" cy="34" r="5" fill="#ef4444"/>
  <circle cx="58" cy="34" r="5" fill="#f59e0b"/>
  <circle cx="76" cy="34" r="5" fill="#22c55e"/>
  <text x="400" y="39" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#94a3b8">IoT Fleet Monitoring - LLM Function Calling Orchestration</text>

  <!-- Left panel: Device Status Timeline -->
  <rect x="20" y="64" width="480" height="222" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <text x="36" y="88" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#cbd5e1">DEVICE STATUS TIMELINE (Last 24h)</text>

  <!-- GPS Status -->
  <text x="36" y="118" font-family="monospace" font-size="11" fill="#94a3b8">GPS Status</text>
  <rect x="130" y="106" width="356" height="18" rx="3" fill="#1a2332"/>
  <rect x="130" y="106" width="90" height="18" rx="3" fill="url(#barGreen)"/>
  <rect x="220" y="106" width="40" height="18" fill="#ef4444" opacity="0.8"/>
  <rect x="260" y="106" width="226" height="18" rx="3" fill="url(#barGreen)"/>
  <circle cx="240" cy="115" r="7" fill="#ef4444" opacity="0.9"/>
  <text x="237" y="119" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white">!</text>

  <!-- Camera -->
  <text x="36" y="148" font-family="monospace" font-size="11" fill="#94a3b8">Camera</text>
  <rect x="130" y="136" width="356" height="18" rx="3" fill="#1a2332"/>
  <rect x="130" y="136" width="180" height="18" rx="3" fill="url(#barGreen)"/>
  <rect x="310" y="136" width="30" height="18" fill="#f59e0b" opacity="0.8"/>
  <rect x="340" y="136" width="146" height="18" rx="3" fill="url(#barGreen)"/>

  <!-- CPU Usage -->
  <text x="36" y="178" font-family="monospace" font-size="11" fill="#94a3b8">CPU Usage</text>
  <rect x="130" y="166" width="356" height="18" rx="3" fill="#1a2332"/>
  <rect x="130" y="166" width="270" height="18" rx="3" fill="url(#barBlue)"/>
  <rect x="400" y="166" width="30" height="18" fill="#ef4444" opacity="0.8"/>
  <rect x="430" y="166" width="56" height="18" rx="3" fill="url(#barBlue)"/>
  <circle cx="415" cy="175" r="7" fill="#ef4444" opacity="0.9"/>
  <text x="412" y="179" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="white">!</text>

  <!-- Temperature -->
  <text x="36" y="208" font-family="monospace" font-size="11" fill="#94a3b8">Temperature</text>
  <rect x="130" y="196" width="356" height="18" rx="3" fill="#1a2332"/>
  <rect x="130" y="196" width="356" height="18" rx="3" fill="url(#barGreen)"/>

  <!-- Battery -->
  <text x="36" y="238" font-family="monospace" font-size="11" fill="#94a3b8">Battery</text>
  <rect x="130" y="226" width="356" height="18" rx="3" fill="#1a2332"/>
  <rect x="130" y="226" width="320" height="18" rx="3" fill="url(#barGreen)"/>
  <rect x="450" y="226" width="36" height="18" rx="3" fill="#f59e0b" opacity="0.6"/>

  <!-- Time axis -->
  <text x="130" y="264" font-family="monospace" font-size="9" fill="#64748b">0h</text>
  <text x="219" y="264" font-family="monospace" font-size="9" fill="#64748b">6h</text>
  <text x="308" y="264" font-family="monospace" font-size="9" fill="#64748b">12h</text>
  <text x="397" y="264" font-family="monospace" font-size="9" fill="#64748b">18h</text>
  <text x="470" y="264" font-family="monospace" font-size="9" fill="#64748b">24h</text>

  <!-- Right panel: LLM Analysis Report -->
  <rect x="512" y="64" width="268" height="222" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1"/>
  <rect x="512" y="64" width="268" height="28" rx="8" fill="#1e40af" opacity="0.3"/>
  <text x="528" y="83" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#93c5fd">LLM-GENERATED REPORT</text>
  <path d="M750 72 l3 7 l7 3 l-7 3 l-3 7 l-3-7 l-7-3 l7-3z" fill="#60a5fa" opacity="0.8"/>

  <text x="528" y="110" font-family="system-ui,sans-serif" font-size="10" fill="#f59e0b">2 anomalies detected</text>

  <text x="528" y="132" font-family="system-ui,sans-serif" font-size="10" fill="#cbd5e1">1. GPS signal loss at 04:30-07:15</text>
  <text x="536" y="146" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Likely cause: tunnel or coverage gap</text>
  <text x="536" y="158" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Action: verify route path</text>

  <rect x="528" y="167" width="236" height="1" fill="#334155"/>

  <text x="528" y="184" font-family="system-ui,sans-serif" font-size="10" fill="#cbd5e1">2. CPU spike at 16:00-17:00</text>
  <text x="536" y="198" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Correlates with batch processing</text>
  <text x="536" y="210" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Action: reschedule to off-peak</text>

  <rect x="528" y="219" width="236" height="1" fill="#334155"/>

  <text x="528" y="236" font-family="system-ui,sans-serif" font-size="10" fill="#22c55e">Fleet health: 94% operational</text>
  <text x="528" y="252" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">48/51 devices fully online</text>
  <text x="528" y="266" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">3 devices require attention</text>

  <!-- Bottom panel: Architecture flow -->
  <rect x="20" y="298" width="760" height="86" rx="8" fill="url(#card)" stroke="#334155" stroke-width="1"/>

  <!-- Elasticsearch -->
  <rect x="36" y="314" width="110" height="52" rx="6" fill="#1c2a3a" stroke="#f59e0b" stroke-width="1"/>
  <text x="91" y="336" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#fcd34d">Elasticsearch</text>
  <text x="91" y="352" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">IoT Telemetry</text>

  <!-- Arrow 1 -->
  <path d="M156 340 L194 340" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Tool Functions (stacked look) -->
  <rect x="208" y="310" width="140" height="60" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="278" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#93c5fd">Tool Functions</text>
  <text x="278" y="344" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">query_es() | clean()</text>
  <text x="278" y="356" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">detect() | format()</text>

  <!-- Arrow 2 (bidirectional for function calling) -->
  <path d="M358 334 L404 334" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M404 348 L358 348" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="381" y="328" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b5cf6">call</text>
  <text x="381" y="362" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b5cf6">result</text>

  <!-- LLM Orchestrator -->
  <rect x="414" y="310" width="140" height="60" rx="6" fill="#3b1764" stroke="#8b5cf6" stroke-width="1"/>
  <text x="484" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#c4b5fd">LLM Orchestrator</text>
  <text x="484" y="344" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Function Calling</text>
  <text x="484" y="356" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Context Mgmt</text>

  <!-- Arrow 3 -->
  <path d="M564 340 L606 340" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Daily Report -->
  <rect x="616" y="314" width="148" height="52" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="690" y="336" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#86efac">Daily Report</text>
  <text x="690" y="352" text-anchor="middle" font-family="monospace" font-size="8" fill="#64748b">Insights + Alerts</text>

  <!-- GCP badge -->
  <rect x="698" y="298" width="76" height="18" rx="9" fill="#1e40af" opacity="0.4"/>
  <text x="736" y="311" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#93c5fd">on GCP</text>
</svg>
