or="middle">Chunk Optimization</text><rect width="146" height="22" x="242" y="336" fill="#f0f9ff" stroke="#bae6fd" stroke-width=".8" rx="4"/><text x="315" y="351" fill="#0369a1" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">Metadata Filtering</text><line x1="242" x2="388" y1="372" y2="372" stroke="#e2e8f0" stroke-width=".5"/><text x="315" y="389" fill="#0284c7" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">STILL LIMITED</text><text x="248" y="406" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="7.5">Better retrieval quality</text><text x="248" y="420" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="7.5">but still a fixed pipeline</text><text x="248" y="434" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="7.5">No adaptive decisions</text><text x="248" y="448" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="7.5">Single retrieval pass</text><rect width="170" height="330" x="410" y="137" fill="#fff" stroke="#2563eb" stroke-width="1.5" filter="url(#sR)" rx="10"/><rect width="170" height="36" x="410" y="137" fill="url(#blueG)" rx="10"/><rect width="170" height="13" x="410" y="160" fill="url(#blueG)"/><text x="495" y="161" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">Modular RAG</text><rect width="44" height="16" x="422" y="182" fill="#eff6ff" stroke="#93c5fd" stroke-width=".5" rx="8"/><text x="444" y="193" fill="#1d4ed8" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-weight="600" text-anchor="middle">Gen 3</text><text x="495" y="214" fill="#2563eb" font-family="Inter, system-ui, sans-serif" font-size="8.5" font-weight="600" text-anchor="middle">Pluggable Modules</text><rect width="68" height="30" x="422" y="224" fill="#eff6ff" stroke="#93c5fd" stroke-width=".8" rx="5"/><text x="456" y="242" fill="#1d4ed8" font-family="Inter, syst