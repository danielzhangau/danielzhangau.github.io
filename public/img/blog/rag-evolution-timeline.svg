 marker-end="url(#arrLoop)" d="M 922 238 C 932 238 932 338 922 338"/><text x="934" y="292" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="6.5" font-weight="600" text-anchor="middle" transform="rotate(90, 934, 292)">LOOP</text><line x1="782" x2="928" y1="362" y2="362" stroke="#e2e8f0" stroke-width=".5"/><text x="855" y="379" fill="#059669" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" text-anchor="middle">KEY CAPABILITY</text><text x="788" y="396" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="7.5">Model controls retrieval</text><text x="788" y="410" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="7.5">Self-correcting searches</text><text x="788" y="424" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="7.5">Multi-agent collaboration</text><text x="788" y="438" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="7.5">A-RAG framework (2026)</text><rect width="320" height="20" x="320" y="474" fill="#f1f5f9" stroke="#cbd5e1" stroke-width=".5" rx="10"/><text x="480" y="488" fill="#64748b" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Static Pipeline ──────&gt; Autonomous Agent</text><defs><marker id="arrLoop" markerHeight="5" markerWidth="6" orient="auto" refX="5" refY="2.5"><path fill="#10b981" d="M 0 0 L 6 2.5 L 0 5 Z"/></marker></defs></svg>