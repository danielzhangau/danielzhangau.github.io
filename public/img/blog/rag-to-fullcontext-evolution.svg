<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>

  <rect width="720" height="300" rx="12" fill="#f8fafc" />

  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Three Architectures, One Knowledge Base</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#64748b">What I shipped, in order — and why the last one stuck</text>

  <!-- Card 1: Client-side RAG (deleted) -->
  <rect x="24" y="72" width="196" height="168" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)" />
  <rect x="40" y="86" width="66" height="18" rx="9" fill="#fee2e2" />
  <text x="73" y="99" text-anchor="middle" font-size="9" font-weight="700" fill="#b91c1c">DELETED</text>
  <text x="40" y="138" font-size="28" font-weight="800" fill="#ef4444">v1</text>
  <text x="40" y="158" font-size="12.5" font-weight="700" fill="#991b1b">Client-side RAG</text>
  <text x="40" y="178" font-size="9.5" fill="#7f1d1d">656MB embedding model</text>
  <text x="40" y="191" font-size="9.5" fill="#7f1d1d">loaded in every browser</text>
  <line x1="40" y1="204" x2="204" y2="204" stroke="#fecaca" stroke-width="1" />
  <text x="40" y="221" font-size="9" fill="#b91c1c">Backwards UX: slowest for</text>
  <text x="40" y="233" font-size="9" fill="#b91c1c">the on-site mobile users</text>

  <!-- Arrow 1 -->
  <line x1="224" y1="156" x2="256" y2="156" stroke="#94a3b8" stroke-width="1.5" />
  <polygon points="256,152 266,156 256,160" fill="#94a3b8" />

  <!-- Card 2: Server-side RAG (deleted) -->
  <rect x="262" y="72" width="196" height="168" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)" />
  <rect x="278" y="86" width="66" height="18" rx="9" fill="#fef3c7" />
  <text x="311" y="99" text-anchor="middle" font-size="9" font-weight="700" fill="#b45309">DELETED</text>
  <text x="278" y="138" font-size="28" font-weight="800" fill="#f59e0b">v2</text>
  <text x="278" y="158" font-size="12.5" font-weight="700" fill="#92400e">Server-side RAG</text>
  <text x="278" y="178" font-size="9.5" fill="#78350f">Embeddings, vector store,</text>
  <text x="278" y="191" font-size="9.5" fill="#78350f">top-k retrieval</text>
  <line x1="278" y1="204" x2="442" y2="204" stroke="#fde68a" stroke-width="1" />
  <text x="278" y="221" font-size="9" fill="#b45309">Silent gaps when a spec's</text>
  <text x="278" y="233" font-size="9" fill="#b45309">cross-reference is dropped</text>

  <!-- Arrow 2 -->
  <line x1="462" y1="156" x2="494" y2="156" stroke="#94a3b8" stroke-width="1.5" />
  <polygon points="494,152 504,156 494,160" fill="#94a3b8" />

  <!-- Card 3: Full-context injection (shipped) -->
  <rect x="500" y="72" width="196" height="168" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)" />
  <rect x="516" y="86" width="68" height="18" rx="9" fill="#dcfce7" />
  <text x="550" y="99" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d">SHIPPED</text>
  <text x="516" y="138" font-size="28" font-weight="800" fill="#22c55e">v3</text>
  <text x="516" y="158" font-size="12.5" font-weight="700" fill="#166534">Full-context inject</text>
  <text x="516" y="178" font-size="9.5" fill="#14532d">Whole docs in the prompt</text>
  <text x="516" y="191" font-size="9.5" fill="#14532d">+ automatic prefix cache</text>
  <line x1="516" y1="204" x2="680" y2="204" stroke="#bbf7d0" stroke-width="1" />
  <text x="516" y="221" font-size="9" fill="#15803d">Nothing to retrieve, so</text>
  <text x="516" y="233" font-size="9" fill="#15803d">nothing to retrieve wrong</text>

  <!-- Footnote -->
  <text x="360" y="276" text-anchor="middle" font-size="10" fill="#475569">The realization: the whole corpus is ~10.3K tokens — it fits in context whole, so there was never anything to retrieve from.</text>
</svg>
