<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif" viewBox="0 0 720 520"><defs><filter id="shadow" width="104%" height="108%" x="-2%" y="-2%"><feDropShadow dx="0" dy="1" flood-opacity=".08" stdDeviation="2"/></filter><marker id="arrowDown" markerHeight="6" markerWidth="8" orient="auto" refX="4" refY="6"><polygon fill="#94a3b8" points="0 0 8 0 4 6"/></marker><marker id="arrowUp" markerHeight="6" markerWidth="8" orient="auto" refX="4" refY="0"><polygon fill="#e11d48" points="0 6 8 6 4 0"/></marker></defs><rect width="720" height="520" fill="#f8fafc" rx="12"/><text x="360" y="32" fill="#1e293b" font-size="17" font-weight="700" text-anchor="middle">Seven-Layer Harness Architecture</text><text x="360" y="50" fill="#64748b" font-size="11" text-anchor="middle">From intent to production feedback — a complete agent governance stack</text><rect width="520" height="48" x="60" y="68" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)" rx="8"/><text x="80" y="88" fill="#92400e" font-size="10" font-weight="700">1</text><circle cx="80" cy="92" r="10" fill="#f59e0b" opacity=".2"/><text x="80" y="96" fill="#92400e" font-size="10" font-weight="700" text-anchor="middle">1</text><text x="104" y="88" fill="#92400e" font-size="13" font-weight="600">Intent Capture</text><text x="104" y="104" fill="#78350f" font-size="10">Product requests, bug reports, customer signals flowing into the system</text><line x1="320" x2="320" y1="116" y2="126" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/><rect width="520" height="48" x="60" y="130" fill="#ffedd5" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="80" cy="154" r="10" fill="#f97316" opacity=".2"/><text x="80" y="158" fill="#9a3412" font-size="10" font-weight="700" text-anchor="middle">2</text><text x="104" y="150" fill="#9a3412" font-size="13" font-weight="600">Spec / Issue Framing</text><text x="104" y="166" fill="#7c2d12" font-size="10">Bounded instructions with constraints and success criteria</text><line x1="320" x2="320" y1="178" y2="188" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/><rect width="520" height="48" x="60" y="192" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="80" cy="216" r="10" fill="#3b82f6" opacity=".2"/><text x="80" y="220" fill="#1e40af" font-size="10" font-weight="700" text-anchor="middle">3</text><text x="104" y="212" fill="#1e40af" font-size="13" font-weight="600">Context &amp; Instruction Layer</text><text x="104" y="228" fill="#1e3a8a" font-size="10">CLAUDE.md, AGENTS.md, rules, skills, documentation</text><line x1="320" x2="320" y1="240" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/><rect width="520" height="48" x="60" y="254" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="80" cy="278" r="10" fill="#22c55e" opacity=".2"/><text x="80" y="282" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">4</text><text x="104" y="274" fill="#166534" font-size="13" font-weight="600">Execution Layer</text><text x="104" y="290" fill="#14532d" font-size="10">Agents editing code, calling tools, generating outputs</text><line x1="320" x2="320" y1="302" y2="312" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/><rect width="520" height="48" x="60" y="316" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="80" cy="340" r="10" fill="#8b5cf6" opacity=".2"/><text x="80" y="344" fill="#5b21b6" font-size="10" font-weight="700" text-anchor="middle">5</text><text x="104" y="336" fill="#5b21b6" font-size="13" font-weight="600">Verification Layer</text><text x="104" y="352" fill="#4c1d95" font-size="10">Tests, static analysis, review agents, CI gates</text><line x1="320" x2="320" y1="364" y2="374" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/><rect width="520" height="48" x="60" y="378" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="80" cy="402" r="10" fill="#ec4899" opacity=".2"/><text x="80" y="406" fill="#9d174d" font-size="10" font-weight="700" text-anchor="middle">6</text><text x="104" y="398" fill="#9d174d" font-size="13" font-weight="600">Isolation &amp; Permission Layer</text><text x="104" y="414" fill="#831843" font-size="10">Git worktrees, sandboxes, approval flows, credential scoping</text><line x1="320" x2="320" y1="426" y2="436" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowDown)"/><rect width="520" height="48" x="60" y="440" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="80" cy="464" r="10" fill="#ef4444" opacity=".2"/><text x="80" y="468" fill="#991b1b" font-size="10" font-weight="700" text-anchor="middle">7</text><text x="104" y="460" fill="#991b1b" font-size="13" font-weight="600">Feedback Layer</text><text x="104" y="476" fill="#7f1d1d" font-size="10">Production telemetry, customer signals, failure analysis</text><path fill="none" stroke="#e11d48" stroke-dasharray="6 3" stroke-width="2" d="M 580 488 Q 600 488 620 488 C 660 488 660 460 660 430 L 660 100 C 660 76 640 68 620 68 L 584 68"/><polygon fill="#e11d48" points="588 62 580 68 588 74"/><text x="672" y="280" fill="#e11d48" font-size="9" font-weight="600" text-anchor="middle" transform="rotate(90, 672, 280)">Continuous Feedback Loop</text><rect width="70" height="428" x="596" y="64" fill="none" stroke="#e11d48" stroke-dasharray="4 4" stroke-width="1" opacity=".2" rx="8"/></svg>