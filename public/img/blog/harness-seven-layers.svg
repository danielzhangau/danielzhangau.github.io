<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif" viewBox="0 0 700 520"><defs><filter id="shadow" width="104%" height="108%" x="-2%" y="-2%"><feDropShadow dx="0" dy="1" flood-opacity=".08" stdDeviation="2"/></filter></defs><rect width="700" height="520" fill="#f8fafc" rx="12"/><text x="310" y="32" fill="#1e293b" font-size="17" font-weight="700" text-anchor="middle">Seven-Layer Harness Architecture</text><text x="310" y="50" fill="#64748b" font-size="11" text-anchor="middle">From intent to production feedback — a complete agent governance stack</text><rect width="520" height="48" x="50" y="68" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="72" cy="92" r="10" fill="#f59e0b" opacity=".25"/><text x="72" y="96" fill="#92400e" font-size="10" font-weight="700" text-anchor="middle">1</text><text x="96" y="88" fill="#92400e" font-size="13" font-weight="600">Intent Capture</text><text x="96" y="104" fill="#78350f" font-size="10">Product requests, bug reports, customer signals flowing into the system</text><polygon fill="#94a3b8" points="314 118 320 128 326 118"/><rect width="520" height="48" x="50" y="132" fill="#ffedd5" stroke="#f97316" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="72" cy="156" r="10" fill="#f97316" opacity=".25"/><text x="72" y="160" fill="#9a3412" font-size="10" font-weight="700" text-anchor="middle">2</text><text x="96" y="152" fill="#9a3412" font-size="13" font-weight="600">Spec / Issue Framing</text><text x="96" y="168" fill="#7c2d12" font-size="10">Bounded instructions with constraints and success criteria</text><polygon fill="#94a3b8" points="314 182 320 192 326 182"/><rect width="520" height="48" x="50" y="196" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="72" cy="220" r="10" fill="#3b82f6" opacity=".25"/><text x="72" y="224" fill="#1e40af" font-size="10" font-weight="700" text-anchor="middle">3</text><text x="96" y="216" fill="#1e40af" font-size="13" font-weight="600">Context &amp; Instruction Layer</text><text x="96" y="232" fill="#1e3a8a" font-size="10">CLAUDE.md, AGENTS.md, rules, skills, documentation</text><polygon fill="#94a3b8" points="314 246 320 256 326 246"/><rect width="520" height="48" x="50" y="260" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="72" cy="284" r="10" fill="#22c55e" opacity=".25"/><text x="72" y="288" fill="#166534" font-size="10" font-weight="700" text-anchor="middle">4</text><text x="96" y="280" fill="#166534" font-size="13" font-weight="600">Execution Layer</text><text x="96" y="296" fill="#14532d" font-size="10">Agents editing code, calling tools, generating outputs</text><polygon fill="#94a3b8" points="314 310 320 320 326 310"/><rect width="520" height="48" x="50" y="324" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="72" cy="348" r="10" fill="#8b5cf6" opacity=".25"/><text x="72" y="352" fill="#5b21b6" font-size="10" font-weight="700" text-anchor="middle">5</text><text x="96" y="344" fill="#5b21b6" font-size="13" font-weight="600">Verification Layer</text><text x="96" y="360" fill="#4c1d95" font-size="10">Tests, static analysis, review agents, CI gates</text><polygon fill="#94a3b8" points="314 374 320 384 326 374"/><rect width="520" height="48" x="50" y="388" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="72" cy="412" r="10" fill="#ec4899" opacity=".25"/><text x="72" y="416" fill="#9d174d" font-size="10" font-weight="700" text-anchor="middle">6</text><text x="96" y="408" fill="#9d174d" font-size="13" font-weight="600">Isolation &amp; Permission Layer</text><text x="96" y="424" fill="#831843" font-size="10">Git worktrees, sandboxes, approval flows, credential scoping</text><polygon fill="#94a3b8" points="314 438 320 448 326 438"/><rect width="520" height="48" x="50" y="452" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)" rx="8"/><circle cx="72" cy="476" r="10" fill="#ef4444" opacity=".25"/><text x="72" y="480" fill="#991b1b" font-size="10" font-weight="700" text-anchor="middle">7</text><text x="96" y="472" fill="#991b1b" font-size="13" font-weight="600">Feedback Layer</text><text x="96" y="488" fill="#7f1d1d" font-size="10">Production telemetry, customer signals, failure analysis</text><path fill="none" stroke="#e11d48" stroke-dasharray="6 3" stroke-width="2" d="M 570 500 C 640 500 640 490 640 440 L 640 108 C 640 72 630 68 600 68 L 574 68"/><polygon fill="#e11d48" points="578 62 570 68 578 74"/><text x="656" y="284" fill="#e11d48" font-size="9" font-weight="600" text-anchor="middle" transform="rotate(90, 656, 284)">Continuous Feedback Loop</text></svg>