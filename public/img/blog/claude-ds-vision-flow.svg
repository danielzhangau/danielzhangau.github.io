<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="Inter, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="280" rx="12" fill="#f8fafc" />

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Vision Workaround for Text-Only Models</text>
  <text x="360" y="48" text-anchor="middle" font-size="11" fill="#64748b">PreToolUse hook intercepts image reads and redirects to Vision MCP</text>

  <!-- Step 1: User pastes image -->
  <rect x="30" y="72" width="120" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
  <text x="90" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">User pastes</text>
  <text x="90" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">image</text>

  <!-- Arrow 1->2 -->
  <line x1="150" y1="97" x2="180" y2="97" stroke="#94a3b8" stroke-width="1.5" />
  <polygon points="180,93 190,97 180,101" fill="#94a3b8" />

  <!-- Step 2: Model tries Read -->
  <rect x="190" y="72" width="120" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)" />
  <text x="250" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">DeepSeek tries</text>
  <text x="250" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca">Read(.png)</text>

  <!-- Arrow 2->3 -->
  <line x1="310" y1="97" x2="340" y2="97" stroke="#94a3b8" stroke-width="1.5" />
  <polygon points="340,93 350,97 340,101" fill="#94a3b8" />

  <!-- Step 3: Hook blocks -->
  <rect x="350" y="72" width="130" height="50" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)" />
  <text x="415" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">vision-guard hook</text>
  <text x="415" y="102" text-anchor="middle" font-size="10" font-weight="700" fill="#b91c1c">BLOCKED</text>
  <text x="415" y="114" text-anchor="middle" font-size="8" fill="#991b1b">exit 2 + message</text>

  <!-- Arrow 3->4 -->
  <line x1="480" y1="97" x2="510" y2="97" stroke="#94a3b8" stroke-width="1.5" />
  <polygon points="510,93 520,97 510,101" fill="#94a3b8" />

  <!-- Step 4: Model calls see_image -->
  <rect x="520" y="72" width="130" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)" />
  <text x="585" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Model calls</text>
  <text x="585" y="106" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">see_image</text>

  <!-- Arrow down from step 4 -->
  <line x1="585" y1="122" x2="585" y2="152" stroke="#94a3b8" stroke-width="1.5" />
  <polygon points="581,152 585,162 589,152" fill="#94a3b8" />

  <!-- Step 5: Vision MCP -->
  <rect x="510" y="164" width="150" height="50" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5" filter="url(#shadow)" />
  <text x="585" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#854d0e">Vision MCP Server</text>
  <text x="585" y="198" text-anchor="middle" font-size="9" fill="#713f12">Qwen3-VL / GPT-4o / etc.</text>

  <!-- Arrow left from Vision MCP -->
  <line x1="510" y1="189" x2="370" y2="189" stroke="#94a3b8" stroke-width="1.5" />
  <polygon points="370,185 360,189 370,193" fill="#94a3b8" />

  <!-- Step 6: Result -->
  <rect x="220" y="164" width="140" height="50" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)" />
  <text x="290" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">Image description</text>
  <text x="290" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#15803d">returned to model</text>

  <!-- Arrow left from Result -->
  <line x1="220" y1="189" x2="150" y2="189" stroke="#94a3b8" stroke-width="1.5" />
  <polygon points="150,185 140,189 150,193" fill="#94a3b8" />

  <!-- Step 7: User sees answer -->
  <rect x="30" y="164" width="110" height="50" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)" />
  <text x="85" y="184" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">User sees</text>
  <text x="85" y="198" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">answer</text>

  <!-- Legend -->
  <rect x="30" y="240" width="12" height="12" rx="2" fill="#fee2e2" stroke="#ef4444" stroke-width="1" />
  <text x="48" y="250" font-size="9" fill="#64748b">Deterministic hook interception</text>

  <rect x="240" y="240" width="12" height="12" rx="2" fill="#dcfce7" stroke="#16a34a" stroke-width="1" />
  <text x="258" y="250" font-size="9" fill="#64748b">Probabilistic model compliance</text>

  <rect x="470" y="240" width="12" height="12" rx="2" fill="#fef9c3" stroke="#ca8a04" stroke-width="1" />
  <text x="488" y="250" font-size="9" fill="#64748b">External vision API</text>
</svg>
