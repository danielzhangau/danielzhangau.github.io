<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 960 520"><defs><linearGradient id="bgGrad" x1="0" x2="960" y1="0" y2="520" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f1f5f9"/></linearGradient><linearGradient id="blueGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#2563eb"/></linearGradient><linearGradient id="greenGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#059669"/></linearGradient><linearGradient id="purpleGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient><linearGradient id="orangeGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#d97706"/></linearGradient><linearGradient id="slateGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#64748b"/><stop offset="100%" stop-color="#475569"/></linearGradient><filter id="shadow" width="108%" height="112%" x="-4%" y="-4%"><feDropShadow dx="0" dy="2" flood-color="#0f172a" flood-opacity=".08" stdDeviation="3"/></filter><filter id="shadowSm" width="104%" height="112%" x="-2%" y="-4%"><feDropShadow dx="0" dy="1" flood-color="#0f172a" flood-opacity=".06" stdDeviation="2"/></filter></defs><rect width="960" height="520" fill="url(#bgGrad)" rx="12"/><rect width="960" height="520" fill="none" stroke="#e2e8f0" stroke-width="1" rx="12"/><text x="480" y="38" fill="#0f172a" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Architecture Comparison</text><line x1="480" x2="480" y1="52" y2="510" stroke="#cbd5e1" stroke-dasharray="6 4" stroke-width="1"/><rect width="220" height="30" x="120" y="56" fill="url(#blueGrad)" filter="url(#shadowSm)" rx="15"/><text x="230" y="76" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Function Calling</text><rect width="100" height="40" x="30" y="110" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowSm)" rx="8"/><text x="80" y="134" fill="#334155" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">User</text><line x1="130" x2="158" y1="130" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/><rect width="170" height="120" x="160" y="100" fill="#fff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)" rx="10"/><text x="245" y="120" fill="#1e40af" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">LLM API Request</text><rect width="146" height="24" x="172" y="128" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1" rx="4"/><text x="245" y="144" fill="#3b82f6" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">Prompt + Context</text><rect width="146" height="50" x="172" y="158" fill="#fef3c7" stroke="#fcd34d" stroke-width="1" rx="4"/><text x="245" y="174" fill="#92400e" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" text-anchor="middle">Tool Schemas (JSON)</text><text x="245" y="188" fill="#a16207" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">query_es(), detect(), format()</text><text x="245" y="200" fill="#b45309" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-style="italic" text-anchor="middle">Sent with EVERY request</text><path stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)" d="M 330 160 L 355 160"/><rect width="100" height="80" x="357" y="120" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadowSm)" rx="8"/><text x="407" y="145" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">App Code</text><text x="407" y="160" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">Execute functions</text><text x="407" y="172" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">Return results</text><text x="407" y="184" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">Handle auth</text><path stroke="#94a3b8" stroke-dasharray="4 3" stroke-width="1.2" marker-end="url(#arrowGray)" d="M 357 180 L 330 180"/><rect width="90" height="36" x="50" y="260" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm)" rx="6"/><text x="95" y="282" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">Database</text><rect width="90" height="36" x="155" y="260" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm)" rx="6"/><text x="200" y="282" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">API</text><rect width="90" height="36" x="260" y="260" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm)" rx="6"/><text x="305" y="282" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">File System</text><rect width="90" height="36" x="365" y="260" fill="#fff" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm)" rx="6"/><text x="410" y="282" fill="#475569" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" text-anchor="middle">3rd Party</text><line x1="380" x2="95" y1="200" y2="258" stroke="#94a3b8" stroke-dasharray="3 2" stroke-width="1"/><line x1="395" x2="200" y1="200" y2="258" stroke="#94a3b8" stroke-dasharray="3 2" stroke-width="1"/><line x1="410" x2="305" y1="200" y2="258" stroke="#94a3b8" stroke-dasharray="3 2" stroke-width="1"/><line x1="425" x2="410" y1="200" y2="258" stroke="#94a3b8" stroke-dasharray="3 2" stroke-width="1"/><rect width="420" height="185" x="40" y="320" fill="#fff7ed" stroke="#fed7aa" stroke-width="1" rx="8"/><text x="250" y="342" fill="#9a3412" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Characteristics</text><circle cx="65" cy="366" r="4" fill="#f97316"/><text x="78" y="370" fill="#431407" font-family="Inter, system-ui, sans-serif" font-size="10">Tool schemas embedded in every API call (token overhead)</text><circle cx="65" cy="392" r="4" fill="#f97316"/><text x="78" y="396" fill="#431407" font-family="Inter, system-ui, sans-serif" font-size="10">Vendor-specific format (OpenAI ≠ Anthropic ≠ Google)</text><circle cx="65" cy="418" r="4" fill="#f97316"/><text x="78" y="422" fill="#431407" font-family="Inter, system-ui, sans-serif" font-size="10">App code manages all auth, execution, error handling</text><circle cx="65" cy="444" r="4" fill="#f97316"/><text x="78" y="448" fill="#431407" font-family="Inter, system-ui, sans-serif" font-size="10">Stateless — no persistent connection between calls</text><circle cx="65" cy="470" r="4" fill="#10b981"/><text x="78" y="474" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="10">Simple to implement, direct control, great for 1–5 tools</text><circle cx="65" cy="496" r="4" fill="#10b981"/><text x="78" y="500" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="10">No additional infrastructure needed</text><rect width="220" height="30" x="620" y="56" fill="url(#purpleGrad)" filter="url(#shadowSm)" rx="15"/><text x="730" y="76" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle">Model Context Protocol (MCP)</text><rect width="80" height="40" x="500" y="110" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowSm)" rx="8"/><text x="540" y="134" fill="#334155" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">User</text><line x1="580" x2="603" y1="130" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/