" y="232" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">MCP Server</text><text x="710" y="244" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">API Integrations</text><text x="710" y="256" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-style="italic" text-anchor="middle">Auth + Permissions</text><rect width="120" height="56" x="790" y="210" fill="#fff" stroke="#10b981" stroke-width="1.5" filter="url(#shadowSm)" rx="8"/><text x="850" y="232" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" text-anchor="middle">MCP Server</text><text x="850" y="244" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">File System</text><text x="850" y="256" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="7.5" font-style="italic" text-anchor="middle">Auth + Permissions</text><line x1="770" x2="600" y1="156" y2="210" stroke="#8b5cf6" stroke-width="1.2"/><line x1="800" x2="710" y1="156" y2="210" stroke="#8b5cf6" stroke-width="1.2"/><line x1="830" x2="850" y1="156" y2="210" stroke="#8b5cf6" stroke-width="1.2"/><rect width="86" height="28" x="527" y="282" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1" rx="5"/><text x="570" y="300" fill="#047857" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">PostgreSQL</text><rect width="86" height="28" x="667" y="282" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1" rx="5"/><text x="710" y="300" fill="#047857" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">Slack / GitHub</text><rect width="86" height="28" x="807" y="282" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1" rx="5"/><text x="850" y="300" fill="#047857" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">Local Files</text><line x1="570" x2="570" y1="266" y2="282" stroke="#10b981" stroke-width="1"/><line x1="710" x2="710" y1="266" y2="282" stroke="#10b981" stroke-width="1"/><line x1="850" x2="850" y1="266" y2="282" stroke="#10b981" stroke-width="1"/><rect width="100" height="22" x="595" y="162" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1" rx="4"/><text x="645" y="177" fill="#7c3aed" font-family="Inter, system-ui, sans-serif" font-size="7.5" text-anchor="middle">Works with ANY LLM</text><rect width="420" height="185" x="500" y="320" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1" rx="8"/><text x="710" y="342" fill="#5b21b6" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">Characteristics</text><circle cx="525" cy="366" r="4" fill="#10b981"/><text x="538" y="370" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="10">Universal standard — one server works with all LLM providers</text><circle cx="525" cy="392" r="4" fill="#10b981"/><text x="538" y="396" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="10">Dynamic tool discovery at runtime (tools/list)</text><circle cx="525" cy="418" r="4" fill="#10b981"/><text x="538" y="422" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="10">Credential isolation &amp; least-privilege at server level</text><circle cx="525" cy="444" r="4" fill="#10b981"/><text x="538" y="448" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="10">40–60% lower token usage in tool-heavy workflows</text><circle cx="525" cy="470" r="4" fill="#10b981"/><text x="538" y="474" fill="#065f46" font-family="Inter, system-ui, sans-serif" font-size="10">97M+ monthly downloads, 28% Fortune 500 adoption</text><circle cx="525" cy="496" r="4" fill="#f97316"/><text x="538" y="500" fill="#431407" font-family="Inter, system-ui, sans-serif" font-size="10">Additional infrastructure — requires running MCP servers</text><defs><marker id="arrowGray" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#94a3b8" d="M 0 0 L 8 3 L 0 6 Z"/></marker><marker id="arrowPurple" markerHeight="6" markerWidth="8" orient="auto" refX="7" refY="3"><path fill="#8b5cf6" d="M 0 0 L 8 3 L 0 6 Z"/></marker></defs></svg>