<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="960" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="slateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadowSm" x="-2%" y="-4%" width="104%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="12" fill="url(#bgGrad)"/>
  <rect width="960" height="520" rx="12" stroke="#e2e8f0" stroke-width="1" fill="none"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Architecture Comparison</text>

  <!-- Divider -->
  <line x1="480" y1="52" x2="480" y2="510" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- ==================== LEFT: Function Calling ==================== -->

  <!-- Left Title -->
  <rect x="120" y="56" width="220" height="30" rx="15" fill="url(#blueGrad)" filter="url(#shadowSm)"/>
  <text x="230" y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Function Calling</text>

  <!-- User -->
  <rect x="30" y="110" width="100" height="40" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="80" y="134" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#334155">User</text>

  <!-- Arrow User -> LLM -->
  <line x1="130" y1="130" x2="158" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- LLM Box (large, contains tool schemas) -->
  <rect x="160" y="100" width="170" height="120" rx="10" fill="white" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="245" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#1e40af">LLM API Request</text>

  <!-- Prompt sub-box -->
  <rect x="172" y="128" width="146" height="24" rx="4" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1"/>
  <text x="245" y="144" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#3b82f6">Prompt + Context</text>

  <!-- Tool Schemas sub-box -->
  <rect x="172" y="158" width="146" height="50" rx="4" fill="#fef3c7" stroke="#fcd34d" stroke-width="1"/>
  <text x="245" y="174" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600" fill="#92400e">Tool Schemas (JSON)</text>
  <text x="245" y="188" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#a16207">query_es(), detect(), format()</text>
  <text x="245" y="200" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#b45309" font-style="italic">Sent with EVERY request</text>

  <!-- Arrow LLM -> App Code -->
  <path d="M 330 160 L 355 160" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- App Code -->
  <rect x="357" y="120" width="100" height="80" rx="8" fill="white" stroke="#10b981" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="407" y="145" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">App Code</text>
  <text x="407" y="160" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6b7280">Execute functions</text>
  <text x="407" y="172" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6b7280">Return results</text>
  <text x="407" y="184" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6b7280">Handle auth</text>

  <!-- Arrow App Code -> LLM (return) -->
  <path d="M 357 180 L 330 180" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>

  <!-- External Systems row -->
  <rect x="50" y="260" width="90" height="36" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="95" y="282" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" fill="#475569">Database</text>

  <rect x="155" y="260" width="90" height="36" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="200" y="282" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" fill="#475569">API</text>

  <rect x="260" y="260" width="90" height="36" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="305" y="282" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" fill="#475569">File System</text>

  <rect x="365" y="260" width="90" height="36" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#shadowSm)"/>
  <text x="410" y="282" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" fill="#475569">3rd Party</text>

  <!-- Arrows from App Code down to external systems -->
  <line x1="380" y1="200" x2="95" y2="258" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="395" y1="200" x2="200" y2="258" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="410" y1="200" x2="305" y2="258" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="425" y1="200" x2="410" y2="258" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Left Pain Points -->
  <rect x="40" y="320" width="420" height="185" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="250" y="342" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#9a3412">Characteristics</text>

  <circle cx="65" cy="366" r="4" fill="#f97316"/>
  <text x="78" y="370" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#431407">Tool schemas embedded in every API call (token overhead)</text>

  <circle cx="65" cy="392" r="4" fill="#f97316"/>
  <text x="78" y="396" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#431407">Vendor-specific format (OpenAI ≠ Anthropic ≠ Google)</text>

  <circle cx="65" cy="418" r="4" fill="#f97316"/>
  <text x="78" y="422" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#431407">App code manages all auth, execution, error handling</text>

  <circle cx="65" cy="444" r="4" fill="#f97316"/>
  <text x="78" y="448" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#431407">Stateless — no persistent connection between calls</text>

  <circle cx="65" cy="470" r="4" fill="#10b981"/>
  <text x="78" y="474" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#065f46">Simple to implement, direct control, great for 1–5 tools</text>

  <circle cx="65" cy="496" r="4" fill="#10b981"/>
  <text x="78" y="500" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#065f46">No additional infrastructure needed</text>


  <!-- ==================== RIGHT: MCP ==================== -->

  <!-- Right Title -->
  <rect x="620" y="56" width="220" height="30" rx="15" fill="url(#purpleGrad)" filter="url(#shadowSm)"/>
  <text x="730" y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="white">Model Context Protocol (MCP)</text>

  <!-- User (right) -->
  <rect x="500" y="110" width="80" height="40" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="540" y="134" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#334155">User</text>

  <!-- Arrow User -> LLM -->
  <line x1="580" y1="130" x2="603" y2="130" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- LLM Box (compact) -->
  <rect x="605" y="108" width="110" height="44" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="660" y="128" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#5b21b6">LLM</text>
  <text x="660" y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#7c3aed">Prompt only</text>

  <!-- Arrow LLM <-> MCP Client -->
  <line x1="715" y1="130" x2="743" y2="130" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- MCP Client -->
  <rect x="745" y="104" width="110" height="52" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="800" y="126" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#5b21b6">MCP Client</text>
  <text x="800" y="140" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#7c3aed">Dynamic discovery</text>
  <text x="800" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#7c3aed">Stateful sessions</text>

  <!-- Standardized Protocol label -->
  <rect x="738" y="168" width="124" height="18" rx="9" fill="#8b5cf6"/>
  <text x="800" y="181" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="600" fill="white">JSON-RPC Protocol</text>

  <!-- MCP Servers -->
  <!-- Server 1 -->
  <rect x="510" y="210" width="120" height="56" rx="8" fill="white" stroke="#10b981" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="570" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">MCP Server</text>
  <text x="570" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6b7280">Database Tools</text>
  <text x="570" y="256" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#9ca3af" font-style="italic">Auth + Permissions</text>

  <!-- Server 2 -->
  <rect x="650" y="210" width="120" height="56" rx="8" fill="white" stroke="#10b981" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="710" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">MCP Server</text>
  <text x="710" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6b7280">API Integrations</text>
  <text x="710" y="256" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#9ca3af" font-style="italic">Auth + Permissions</text>

  <!-- Server 3 -->
  <rect x="790" y="210" width="120" height="56" rx="8" fill="white" stroke="#10b981" stroke-width="1.5" filter="url(#shadowSm)"/>
  <text x="850" y="232" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600" fill="#065f46">MCP Server</text>
  <text x="850" y="244" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#6b7280">File System</text>
  <text x="850" y="256" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#9ca3af" font-style="italic">Auth + Permissions</text>

  <!-- Arrows from MCP Client to Servers (hub-and-spoke) -->
  <line x1="770" y1="156" x2="600" y2="210" stroke="#8b5cf6" stroke-width="1.2"/>
  <line x1="800" y1="156" x2="710" y2="210" stroke="#8b5cf6" stroke-width="1.2"/>
  <line x1="830" y1="156" x2="850" y2="210" stroke="#8b5cf6" stroke-width="1.2"/>

  <!-- External systems under servers -->
  <rect x="527" y="282" width="86" height="28" rx="5" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="570" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#047857">PostgreSQL</text>

  <rect x="667" y="282" width="86" height="28" rx="5" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="710" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#047857">Slack / GitHub</text>

  <rect x="807" y="282" width="86" height="28" rx="5" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="850" y="300" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#047857">Local Files</text>

  <line x1="570" y1="266" x2="570" y2="282" stroke="#10b981" stroke-width="1"/>
  <line x1="710" y1="266" x2="710" y2="282" stroke="#10b981" stroke-width="1"/>
  <line x1="850" y1="266" x2="850" y2="282" stroke="#10b981" stroke-width="1"/>

  <!-- Multi-provider label -->
  <rect x="595" y="162" width="100" height="22" rx="4" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="645" y="177" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7.5" fill="#7c3aed">Works with ANY LLM</text>

  <!-- Right Advantages -->
  <rect x="500" y="320" width="420" height="185" rx="8" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="710" y="342" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#5b21b6">Characteristics</text>

  <circle cx="525" cy="366" r="4" fill="#10b981"/>
  <text x="538" y="370" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#065f46">Universal standard — one server works with all LLM providers</text>

  <circle cx="525" cy="392" r="4" fill="#10b981"/>
  <text x="538" y="396" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#065f46">Dynamic tool discovery at runtime (tools/list)</text>

  <circle cx="525" cy="418" r="4" fill="#10b981"/>
  <text x="538" y="422" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#065f46">Credential isolation &amp; least-privilege at server level</text>

  <circle cx="525" cy="444" r="4" fill="#10b981"/>
  <text x="538" y="448" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#065f46">40–60% lower token usage in tool-heavy workflows</text>

  <circle cx="525" cy="470" r="4" fill="#10b981"/>
  <text x="538" y="474" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#065f46">97M+ monthly downloads, 28% Fortune 500 adoption</text>

  <circle cx="525" cy="496" r="4" fill="#f97316"/>
  <text x="538" y="500" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#431407">Additional infrastructure — requires running MCP servers</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>